name: Daily PACE Ocean Update

on:
  schedule:
    # Mon, Wed, Fri, Sun: 6 times per day (every ~4 hours UTC)
    - cron: '0 3,7,11,15,19,23 * * 0,1,3,5'
    # Tue, Thu, Sat: 7 times per day (every ~3.4 hours UTC)
    - cron: '0 0,3,6,10,13,17,20 * * 2,4,6'
  
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Configure Git
      run: |
        git config --local user.email "duc.dut.wr@gmail.com"
        git config --local user.name "ductran27"
    
    - name: Run PACE monitoring script
      run: |
        python main.py
    
    - name: Commit and push if changes
      run: |
        git add .
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Daily PACE ocean update: $(date +'%Y-%m-%d')"
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
